<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今天吃什么 - 选择园区</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #fceabb 0%, #f8b500 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 48px;
    }
    h1 {
      margin: 8px 0 8px;
      color: #5a2b00;
      text-shadow: 0 2px 6px rgba(255,255,255,0.5);
      font-size: 32px;
      text-align: center;
    }
    .subtitle {
      color: #7a4a1f;
      font-size: 16px;
      margin-bottom: 36px;
      text-align: center;
    }
    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      width: 100%;
      max-width: 800px;
    }
    .card {
      flex: 1 1 280px;
      max-width: 360px;
      padding: 36px 28px;
      border-radius: 24px;
      text-decoration: none;
      color: #fff;
      text-align: center;
      box-shadow: 0 12px 28px rgba(0,0,0,0.18);
      transition: transform 0.18s, box-shadow 0.18s;
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 36px rgba(0,0,0,0.25);
    }
    .card.park1 { background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%); }
    .card.park2 { background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%); }
    .card .icon {
      font-size: 56px;
      margin-bottom: 12px;
    }
    .card .name {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .card .desc {
      font-size: 14px;
      opacity: 0.92;
    }
    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: #7a4a1f;
      opacity: 0.85;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>今天吃什么？</h1>
  <div class="subtitle">请选择你所在的园区</div>

  <div class="cards">
    <a class="card park1" href="park1.html">
      <div class="icon">🌳</div>
      <div class="name">一号园区</div>
      <div class="desc">配置文件：foods1.json</div>
    </a>
    <a class="card park2" href="park2.html">
      <div class="icon">🍱</div>
      <div class="name">二号园区</div>
      <div class="desc">配置文件：foods2.json</div>
    </a>
  </div>

  <div class="footer">修改对应 JSON 文件后，刷新转盘页面即可生效</div>
</body>
</html>
